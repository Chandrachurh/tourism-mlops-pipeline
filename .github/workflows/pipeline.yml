name: Tourism MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  data-prep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn datasets huggingface_hub

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python visit_with_us_mlops/src/data_preparation.py \
            --dataset_repo "chandrachurhghosh/visit_with_us_mlops" \
            --out_dir "visit_with_us_mlops/data/processed" \
            --push_processed "true"


  model-training:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib huggingface_hub

      - name: Train Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python visit_with_us_mlops/src/train.py \
            --train_path "visit_with_us_mlops/data/processed/train.csv" \
            --test_path "visit_with_us_mlops/data/processed/test.csv" \
            --out_dir "visit_with_us_mlops/experiments/latest" \
            --n_iter 20

      - name: Register Model to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python visit_with_us_mlops/src/register_model.py \
            --repo_id "chandrachurhghosh/visit-with-us-wellness-rf" \
            --artifact_dir "visit_with_us_mlops/experiments/latest"


  deploy-hosting:
    needs: model-training
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python visit_with_us_mlops/deployment/push_to_hf_space.py \
            --space_repo "chandrachurhghosh/visit-with-us-wellness-space" \
            --deploy_dir "visit_with_us_mlops/deployment"
