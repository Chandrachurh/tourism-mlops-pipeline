name: Tourism Project Pipeline

on:
  push:
    branches:
      - main   # Automatically triggers on push to the main branch

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install datasets huggingface_hub pandas

      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'PY'
          import os
          from huggingface_hub import login, upload_folder

          login(token=os.environ["HF_TOKEN"])

          # Upload raw dataset folder to HF Dataset repo
          upload_folder(
              folder_path="visit_with_us_mlops/data/raw",
              repo_id="chandrachurhghosh/visit-with-us-wellness-dataset",
              repo_type="dataset"
          )

          print("✅ Raw dataset uploaded to Hugging Face Dataset Hub")
          PY

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install datasets huggingface_hub pandas scikit-learn

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python visit_with_us_mlops/src/data_preparation.py \
            --dataset_repo "chandrachurhghosh/visit-with-us-wellness-dataset" \
            --out_dir "visit_with_us_mlops/data/processed" \
            --push_processed "true"

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib huggingface_hub

      - name: Model Building (Train + Tune + Save Artifacts)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python visit_with_us_mlops/src/train.py \
            --train_path "visit_with_us_mlops/data/processed/train.csv" \
            --test_path "visit_with_us_mlops/data/processed/test.csv" \
            --out_dir "visit_with_us_mlops/experiments/latest" \
            --n_iter 20

      - name: Register Best Model to Hugging Face Model Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python visit_with_us_mlops/src/register_model.py \
            --repo_id "chandrachurhghosh/visit-with-us-wellness-rf" \
            --artifact_dir "visit_with_us_mlops/experiments/latest"

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-training]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python visit_with_us_mlops/deployment/push_to_hf_space.py \
            --space_repo "chandrachurhghosh/visit-with-us-wellness-space" \
            --deploy_dir "visit_with_us_mlops/deployment"
